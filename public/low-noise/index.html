<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>LOW NOISE</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%2339ff8b' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%2339ff8b'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="field"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="noiseprint" class="hud-line"></div>
    <div id="state-label" class="hud-line"></div>
    <div id="timer" class="hud-line"></div>
  </div>

  <!-- Big centered callouts: REDUCE, LOW FOUND, etc. -->
  <div id="callout"></div>

  <!-- START screen -->
  <section id="screen-start" class="screen">
    <h1>LOW&nbsp;NOISE</h1>
    <p class="tagline">Music from below the noise.</p>
    <p class="hint">Put on headphones.<br />Make the world quieter.</p>
    <button id="btn-reduce" class="btn-primary">REDUCE</button>
    <p class="micro" id="start-micro">LOW RUN · 90s · tilt · hold · swipe · tap · stillness</p>
    <button id="btn-citydub" class="btn-ghost mode-btn">CITY DUB</button>
    <p class="micro">walk 5 min · the street composes the track · auto</p>
    <a class="hub-link" href="../">↑ PLAYGROUND · ALSO: GRAVASTAR LAB</a>
  </section>

  <!-- REPORT screen -->
  <section id="screen-report" class="screen hidden">
    <h2>LOW NOISE REPORT</h2>
    <pre id="report-body"></pre>
    <div class="report-actions">
      <button id="btn-share" class="btn-primary">YOUR LOOP IS READY</button>
      <button id="btn-again" class="btn-ghost">← MODES</button>
    </div>
    <audio id="loop-playback" controls class="hidden"></audio>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
